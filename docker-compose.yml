 # version: '3.8' # not required by newer Compose, removed to avoid warnings
###############################
# Compose centralizado (raíz)
# Use este docker-compose.yml en la raíz para levantar TODOS los servicios
# Evite ejecutar los docker-compose individuales de los submódulos en paralelo
###############################
services:
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    profiles: ["sonarqube"]
    network_mode: host
    environment:
      - SONAR_JDBC_URL=${SONAR_JDBC_URL}
      - SONAR_JDBC_USERNAME=${SONAR_JDBC_USERNAME}
      - SONAR_JDBC_PASSWORD=${SONAR_JDBC_PASSWORD}
      - SONAR_WEB_HOST=0.0.0.0
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    restart: unless-stopped

  db:
    image: postgres:13
    container_name: postgresql
    profiles: ["sonarqube"]
    ports:
      - "${SONAR_DB_PORT}:5432"
    environment:
      - POSTGRES_USER=${SONAR_JDBC_USERNAME}
      - POSTGRES_PASSWORD=${SONAR_JDBC_PASSWORD}
      - POSTGRES_DB=sonar
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    networks:
      - sonarnet
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: postgres
    env_file:
      - ./uis-schedule-system-backend/backend/.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - spring-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend-spring-api:
    image: spring-api-image
    container_name: backend-spring-api-container
    build:
      context: ./uis-schedule-system-backend/backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT}:8080"
    env_file:
      - ./uis-schedule-system-backend/backend/.env
    environment:
      - SPRING_PROFILE=${SPRING_PROFILE}
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - SECURITY_USER_NAME=${SECURITY_USER_NAME}
      - SECURITY_USER_PASSWORD=${SECURITY_USER_PASSWORD}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_USER_GENERATOR=${JWT_USER_GENERATOR}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    networks:
      - spring-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./uis-schedule-system-frontend
      dockerfile: Dockerfile
    container_name: uis-schedule-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - spring-network
    depends_on:
      - backend-spring-api
    restart: unless-stopped

  frontend-dev:
    image: node:20-alpine
    container_name: uis-schedule-frontend-dev
    networks:
      - spring-network
    ports:
      - "4200:4200"
    working_dir: /app
    command: sh -c "npm install && npm run start -- --host 0.0.0.0 --port 4200 --proxy-config proxy.conf.json"
    volumes:
      - ./uis-schedule-system-frontend:/app
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    depends_on:
      - backend-spring-api

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  postgresql_data:
  postgres-data:


networks:
  sonarnet:
  spring-network:
