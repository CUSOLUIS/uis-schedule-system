  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-logs:/var/log/postgresql
    command:
      [
        "postgres",
        "-c",
        "logging_collector=on",
        "-c",
        "log_directory=/var/log/postgresql",
        "-c",
        "log_filename=postgresql-%a.log",
      ]
    networks:
      - spring-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend-spring-api:
    image: spring-api-image
    container_name: backend-spring-api-container
    build:
      context: ./uis-schedule-system-backend/backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      - SPRING_PROFILE=${SPRING_PROFILE}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - SECURITY_USER_NAME=${SECURITY_USER_NAME}
      - SECURITY_USER_PASSWORD=${SECURITY_USER_PASSWORD}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_USER_GENERATOR=${JWT_USER_GENERATOR}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CORS_ALLOWED_METHODS=${CORS_ALLOWED_METHODS}
      - INVITATION_BASE_URL=${INVITATION_BASE_URL}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    networks:
      - spring-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./uis-schedule-system-frontend
      dockerfile: Dockerfile
    container_name: uis-schedule-frontend
    networks:
      - spring-network
    depends_on:
      - backend-spring-api
    restart: unless-stopped

  nginx-gateway:
    image: nginx:alpine
    container_name: nginx-gateway
    ports:
      - "80:80"
      - "4200:4200"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - spring-network
    depends_on:
      - frontend
      - backend-spring-api
    restart: unless-stopped

  frontend-dev:
    image: node:20-alpine
    container_name: uis-schedule-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run start -- --host 0.0.0.0"
    volumes:
      - ./uis-schedule-system-frontend:/app
    environment:
      - NODE_ENV=development
    networks:
      - spring-network
    restart: unless-stopped
    depends_on:
      - backend-spring-api

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  postgresql_data:
  postgres-data:
  postgres-logs:

networks:
  sonarnet:
  spring-network:
